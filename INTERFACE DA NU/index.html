<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nubank</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <!-- Header roxo -->
        <header class="header">
            <div class="header-actions">
                <div class="profile-btn">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    <span class="notification-dot"></span>
                </div>
                <div class="header-icons">
                    <!-- Ícone de olho -->
                    <svg width="32" height="32" viewBox="0 0 40 40" fill="none">
                        <path d="M8 18 C8 13, 14 10, 20 10 C26 10, 32 13, 32 18" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
                        <circle cx="20" cy="21" r="5" stroke="white" stroke-width="3.5"/>
                        <circle cx="20" cy="21" r="2.5" fill="white"/>
                    </svg>
                    <!-- Ícone de interrogação -->
                    <svg width="32" height="32" viewBox="0 0 40 40" fill="none">
                        <circle cx="20" cy="20" r="14" stroke="white" stroke-width="3.5"/>
                        <path d="M15 15 C15 11, 17 9, 20 9 C23 9, 25 11, 25 14 C25 17, 22 18, 20 19 L20 22" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
                        <circle cx="20" cy="27" r="2" fill="white"/>
                    </svg>
                    <!-- Ícone de escudo com check -->
                    <img src="nu.png" alt="Shield check" width="32" height="32" style="cursor: pointer; filter: brightness(0) invert(1); display: block;">
                </div>
            </div>

            <div class="promo-banner">
                <div class="promo-content">
                    <div class="promo-icon">
                        <svg width="40" height="40" viewBox="0 0 40 40">
                            <circle cx="20" cy="20" r="18" fill="#820AD1"/>
                            <path d="M20 12v16M12 20h16" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <p>Pague seu iFood mais rápido com NuPay</p>
                </div>
                <button class="promo-menu">
                    <svg width="4" height="16" viewBox="0 0 4 16" fill="#999">
                        <circle cx="2" cy="2" r="2"/>
                        <circle cx="2" cy="8" r="2"/>
                        <circle cx="2" cy="14" r="2"/>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Main content -->
        <main class="content">
            <section class="account-section">
                <div class="account-header">
                    <span class="account-label">Saldo em conta</span>
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="#999">
                        <path d="M7 4l6 6-6 6"/>
                    </svg>
                </div>
                <div class="account-balance" id="balance">R$ 7,67</div>
            </section>

            <div class="pix-money">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="#FF6B9D">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M12 6v12M6 12h12" stroke="#fff" stroke-width="2"/>
                </svg>
                <span>R$ 0,00</span>
            </div>

            <!-- Quick actions -->
            <div class="actions-grid">
                <button class="action-btn">
                    <div class="action-icon">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                            <path d="M2 17l10 5 10-5M2 12l10 5 10-5"/>
                        </svg>
                    </div>
                    <span>Área Pix e<br>Transferir</span>
                </button>
                <button class="action-btn">
                    <div class="action-icon">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"/>
                            <polyline points="19 12 12 19 5 12"/>
                        </svg>
                    </div>
                    <span>Trazer<br>dinheiro</span>
                </button>
                <button class="action-btn">
                    <div class="action-icon">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                            <rect x="1" y="4" width="22" height="16" rx="2" ry="2"/>
                            <line x1="1" y1="10" x2="23" y2="10"/>
                        </svg>
                    </div>
                    <span>Pagar</span>
                </button>
                <button class="action-btn">
                    <div class="action-icon">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                            <line x1="12" y1="1" x2="12" y2="23"/>
                            <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                        </svg>
                    </div>
                    <span>Pegar<br>emprestado</span>
                </button>
                <button class="action-btn">
                    <div class="action-icon">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                            <rect x="5" y="2" width="14" height="20" rx="2" ry="2"/>
                            <line x1="12" y1="18" x2="12.01" y2="18"/>
                        </svg>
                    </div>
                    <span>Recarga<br>de celular</span>
                </button>
            </div>

            <!-- Cards -->
            <button class="card-item">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                    <rect x="1" y="4" width="22" height="16" rx="2" ry="2"/>
                    <line x1="1" y1="10" x2="23" y2="10"/>
                </svg>
                <span>Meus cartões</span>
            </button>

            <div class="info-card">
                <div class="info-text">
                    <p>Facilite seus planos futuros: guarde dinheiro nas caixinhas</p>
                </div>
                <div class="info-icon">👛</div>
            </div>

            <div class="bottom-text">
                <p>Saldo pago com sucesso</p>
            </div>
        </main>

        <!-- Bottom nav -->
        <nav class="bottom-nav">
            <button class="nav-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2">
                    <rect x="1" y="4" width="22" height="16" rx="2" ry="2"/>
                    <line x1="1" y1="10" x2="23" y2="10"/>
                </svg>
                <span>Cartão</span>
            </button>
            <button class="nav-btn nav-active">
                <div class="nav-circle">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
                        <line x1="12" y1="5" x2="12" y2="19"/>
                        <polyline points="5 12 12 5 19 12"/>
                        <polyline points="5 12 12 19 19 12"/>
                    </svg>
                </div>
            </button>
            <button class="nav-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2">
                    <line x1="12" y1="1" x2="12" y2="23"/>
                    <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                </svg>
            </button>
            <button class="nav-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                </svg>
            </button>
            <button class="nav-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2">
                    <rect x="5" y="2" width="14" height="20" rx="2" ry="2"/>
                    <line x1="12" y1="18" x2="12.01" y2="18"/>
                </svg>
            </button>
            <button class="nav-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2">
                    <polyline points="9 18 15 12 9 6"/>
                </svg>
            </button>
        </nav>
    </div>

    <!-- Modal -->
    <div class="modal" id="modal">
        <div class="modal-overlay"></div>
        <div class="modal-box">
            <h2>Editar Saldo</h2>
            <input type="text" id="balanceInput" placeholder="R$ 0,00">
            <div class="modal-actions">
                <button class="btn-secondary" id="cancelBtn">Cancelar</button>
                <button class="btn-primary" id="saveBtn">Salvar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
